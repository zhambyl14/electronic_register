name: electronic_register
description: iMag Kassa - POS system for Windows
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.6
  firebase_auth: ^5.7.0
  firebase_storage: ^12.3.7

  # State management
  provider: ^6.1.2

  # Serial port for scale (COM port)
  flutter_libserialport: ^0.3.0

  # PDF receipt printing
  pdf: ^3.10.8
  printing: ^5.12.0

  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Charts
  fl_chart: ^0.68.0

  # Excel export
  excel: ^4.0.3
  path_provider: ^2.1.2
  open_file: ^3.3.2

  # HTTP + Crypto for Cloudinary
  http: ^1.2.1
  http_parser: ^4.0.2
  crypto: ^3.0.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  msix: ^3.16.8
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/NotoSans-Regular.ttf
    - assets/images/logo.png
    - assets/certs/cacert.pem
  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf

flutter_launcher_icons:
  windows:
    generate: true
    image_path: assets/images/logo.png
    icon_size: 256

msix_config:
  display_name: iMag Kassa
  publisher_display_name: iMag Kassa
  identity_name: com.magpos.register
  msix_version: 1.0.1.0
  description: iMag Kassa - POS system for Windows
  languages: ru-RU, kk-KZ
  install_certificate: false
  logo_path: assets/images/logo.png
